<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Today · Analytics explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #ececec; }
  /* card primitives reused */
  .card {
    background: var(--surface-card);
    border: 1px solid var(--hairline-soft);
    border-radius: var(--r-md);
  }
  .stat-num { font-weight: 700; color: var(--ink); letter-spacing: -1.2px; line-height: 1; }
  .row-divider { border-top: 1px solid var(--hairline-soft); }
  /* sparkline / chart primitives */
  .axis-text { font-family: var(--font-mono); font-size: 10px; fill: var(--muted-soft); letter-spacing: 0.3px; }
  .grid-line { stroke: var(--hairline-soft); stroke-width: 1; }
  .delta-up { color: var(--good); }
  .delta-down { color: var(--danger); }
  .delta-flat { color: var(--muted); }
  .rationale {
    padding: 14px 16px; background: var(--surface-soft);
    border: 1px dashed var(--hairline);
    border-radius: 10px;
    font-size: 12px; line-height: 1.55; color: var(--body);
  }
  .rationale b { color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useMemo } = React;

/* ------------------------------- shared bits ------------------------------- */

const Header = ({ title, sub, right }) => (
  <div style={{ display: "flex", alignItems: "baseline", marginBottom: 14 }}>
    <span className="t-title-md">{title}</span>
    {sub && <span className="t-caption muted" style={{ marginLeft: 8 }}>{sub}</span>}
    <span style={{ flex: 1 }} />
    {right}
  </div>
);

const Delta = ({ v, suffix = "" }) => {
  if (v === 0) return <span className="delta-flat" style={{ fontSize: 12 }}>— flat</span>;
  const up = v > 0;
  return (
    <span className={up ? "delta-up" : "delta-down"} style={{ fontSize: 12, fontWeight: 500 }}>
      {up ? "↑" : "↓"} {Math.abs(v)}{suffix}
    </span>
  );
};

/* fake but plausible series */
const REVIEW_BACKLOG_24H = [3, 2, 4, 5, 5, 7, 8, 6, 5, 5, 4, 4, 6, 7, 7, 8, 9, 7, 6, 5, 5, 6, 8, 9]; // hourly
const FOCUS_BY_DAY = [
  { d: "Mon", focus: 3.2, meet: 1.5 },
  { d: "Tue", focus: 2.8, meet: 2.5 },
  { d: "Wed", focus: 1.6, meet: 4.2 },
  { d: "Thu", focus: 3.8, meet: 1.0 },
  { d: "Fri", focus: 3.1, meet: 1.2 },
];
const REVIEW_LATENCY_HOURS = [9, 11, 7, 6, 8, 5, 4]; // last 7 days
const SHIP_BY_DAY = [
  { d: "Mon", prs: 2, tickets: 1 },
  { d: "Tue", prs: 3, tickets: 1 },
  { d: "Wed", prs: 1, tickets: 0 },
  { d: "Thu", prs: 4, tickets: 2 },
  { d: "Fri", prs: 2, tickets: 0 },
];
const HOURLY_INTERRUPTS = [0,0,0,0,0,0,0,1,2,4,5,8,11,7,4,3,5,6,4,2,1,1,0,0]; // by hour 0–23
const SOURCE_MIX = [
  { k: "GitHub",   v: 38, c: "var(--src-git)" },
  { k: "Slack",    v: 27, c: "var(--src-slack)" },
  { k: "Calendar", v: 18, c: "var(--src-cal)" },
  { k: "Linear",   v: 12, c: "var(--src-task)" },
  { k: "AI",       v: 5,  c: "var(--src-ai)" },
];

/* ============================================================
   VARIATION A — "Quiet sparkbar header"
   Replace WeekStats with each KPI getting a tiny sparkbar.
   Shipped in-row, no separate chart card. Pure rhythm.
============================================================ */
const SparkBars = ({ values, w = 96, h = 28, color = "var(--ink)" }) => {
  const max = Math.max(...values);
  const bw = w / values.length;
  return (
    <svg width={w} height={h}>
      {values.map((v, i) => {
        const bh = (v / max) * (h - 2);
        return (
          <rect key={i} x={i * bw + 0.5} y={h - bh} width={bw - 1.5}
                height={bh} fill={color} opacity={0.85} rx={1} />
        );
      })}
    </svg>
  );
};
const StatWithSpark = ({ label, value, suffix, delta, deltaSuffix, series }) => (
  <div style={{ padding: "0 18px", borderLeft: "1px solid var(--hairline-soft)" }}>
    <div className="t-mono muted" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
    <div style={{ display: "flex", alignItems: "flex-end", gap: 10, marginTop: 8 }}>
      <span className="stat-num" style={{ fontSize: 32 }}>{value}</span>
      <span className="t-mono muted" style={{ fontSize: 11, marginBottom: 4 }}>{suffix}</span>
    </div>
    <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 10 }}>
      <SparkBars values={series} w={84} h={20} />
      <Delta v={delta} suffix={deltaSuffix} />
    </div>
  </div>
);

const VariationA = () => (
  <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
    <div className="rationale">
      <b>Direction A — Sparkbar replacement.</b> The existing "This week" card already shows the right four KPIs.
      Just upgrade each cell with a tiny 7-day bar and a delta. No new card. No dashboard. Same height.
    </div>
    <div className="card" style={{ padding: "22px 6px" }}>
      <div style={{ display: "flex", alignItems: "baseline", padding: "0 18px", marginBottom: 14 }}>
        <span className="t-title-md">This week</span>
        <span className="t-caption muted" style={{ marginLeft: 8 }}>vs last week</span>
        <span style={{ flex: 1 }} />
        <span className="t-mono muted" style={{ fontSize: 11 }}>Apr 28 – May 4</span>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)" }}>
        <StatWithSpark label="PRs reviewed" value="12" suffix="" delta={+3} deltaSuffix=""
          series={[1,3,2,2,1,2,1]} />
        <StatWithSpark label="Tickets shipped" value="4" suffix="" delta={+1} deltaSuffix=""
          series={[1,1,0,1,1,0,0]} />
        <StatWithSpark label="Focus hours" value="14.5" suffix="h" delta={-1.5} deltaSuffix="h"
          series={[3.2,2.8,1.6,3.8,3.1,0,0]} />
        <StatWithSpark label="Inbox-zero days" value="3" suffix="of 5" delta={0} deltaSuffix=""
          series={[1,1,0,1,0,0,0]} />
      </div>
    </div>
  </div>
);

/* ============================================================
   VARIATION B — "Two-up: focus runway + review backlog"
   Two charts that answer questions for TODAY:
     1) Focus runway — stacked bars by day (focus vs meeting)
     2) Review backlog — area chart with current value pinned
============================================================ */

const StackedBars = ({ data, h = 140 }) => {
  const max = Math.max(...data.map(d => d.focus + d.meet));
  return (
    <svg viewBox={`0 0 280 ${h + 28}`} width="100%" height={h + 28}>
      {/* baseline grid */}
      {[0, 0.5, 1].map((p, i) => (
        <line key={i} x1="34" x2="280" y1={h - p * h} y2={h - p * h} className="grid-line" />
      ))}
      <text x="2" y={4 + 8} className="axis-text">{max.toFixed(0)}h</text>
      <text x="2" y={h / 2 + 4} className="axis-text">{(max/2).toFixed(0)}h</text>
      <text x="2" y={h + 4} className="axis-text">0</text>
      {data.map((d, i) => {
        const bw = 36;
        const gap = 14;
        const x = 40 + i * (bw + gap);
        const total = d.focus + d.meet;
        const focusH = (d.focus / max) * h;
        const meetH = (d.meet / max) * h;
        const isToday = i === 0; // pretend Mon = today
        return (
          <g key={i}>
            <rect x={x} y={h - meetH} width={bw} height={meetH} fill="var(--accent)" rx={2} opacity={0.85} />
            <rect x={x} y={h - meetH - focusH} width={bw} height={focusH} fill="var(--ink)" rx={2} />
            <text x={x + bw/2} y={h + 16} textAnchor="middle" className="axis-text" style={{ fill: isToday ? "var(--ink)" : "var(--muted)" }}>{d.d}</text>
            <text x={x + bw/2} y={h - meetH - focusH - 6} textAnchor="middle"
                  style={{ fontFamily: "var(--font-mono)", fontSize: 10, fill: "var(--ink)", fontWeight: 600 }}>
              {total.toFixed(1)}
            </text>
          </g>
        );
      })}
    </svg>
  );
};

const AreaChart = ({ values, h = 140, w = 320 }) => {
  const max = Math.max(...values, 10);
  const stepX = w / (values.length - 1);
  const points = values.map((v, i) => [i * stepX, h - (v / max) * (h - 12)]);
  const path = points.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const areaPath = path + ` L ${w} ${h} L 0 ${h} Z`;
  const last = points[points.length - 1];
  return (
    <svg viewBox={`0 0 ${w} ${h + 24}`} width="100%" height={h + 24}>
      <defs>
        <linearGradient id="aFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.18" />
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0, 0.5, 1].map((p, i) => (
        <line key={i} x1="0" x2={w} y1={h - p * (h - 12)} y2={h - p * (h - 12)} className="grid-line" />
      ))}
      <path d={areaPath} fill="url(#aFill)" />
      <path d={path} stroke="var(--accent)" strokeWidth="2" fill="none" />
      <circle cx={last[0]} cy={last[1]} r={4} fill="var(--accent)" stroke="var(--canvas)" strokeWidth="2" />
      {/* annotations */}
      <text x={2} y={12} className="axis-text">{max} open</text>
      <text x={2} y={h - 2} className="axis-text">0</text>
      <text x={0} y={h + 16} className="axis-text">24h ago</text>
      <text x={w} y={h + 16} textAnchor="end" className="axis-text">now</text>
    </svg>
  );
};

const VariationB = () => (
  <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
    <div className="rationale">
      <b>Direction B — Two questions, two charts.</b> Replace the four-KPI strip with a pair of charts
      that each answer a question you'd ask <i>this morning</i>: <b>"how much real focus time is left this week?"</b>
      and <b>"is my review backlog growing or shrinking?"</b> Both have a "today" / "now" pin.
    </div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
      <div className="card" style={{ padding: "20px 22px" }}>
        <Header title="Focus runway" sub="this week"
          right={<span className="t-mono muted" style={{ fontSize: 11 }}>14.5h focus · 10.4h meetings</span>} />
        <StackedBars data={FOCUS_BY_DAY} />
        <div style={{ display: "flex", gap: 14, marginTop: 8 }}>
          <span style={{ fontSize: 11, color: "var(--muted)" }}>
            <span style={{ display: "inline-block", width: 8, height: 8, background: "var(--ink)", borderRadius: 2, marginRight: 6 }} />Focus
          </span>
          <span style={{ fontSize: 11, color: "var(--muted)" }}>
            <span style={{ display: "inline-block", width: 8, height: 8, background: "var(--accent)", borderRadius: 2, marginRight: 6 }} />Meetings
          </span>
          <span style={{ flex: 1 }} />
          <span className="t-mono muted" style={{ fontSize: 11 }}>down 1.5h vs last week</span>
        </div>
      </div>
      <div className="card" style={{ padding: "20px 22px" }}>
        <Header title="Review backlog" sub="last 24h"
          right={<span className="t-mono" style={{ fontSize: 11, color: "var(--accent)", fontWeight: 600 }}>9 open · ↑ 2</span>} />
        <AreaChart values={REVIEW_BACKLOG_24H} />
        <div style={{ marginTop: 8, fontSize: 12, color: "var(--muted)" }}>
          Climbing since 7am. <b style={{ color: "var(--ink)" }}>#421 (Priya)</b> is your oldest unactioned.
        </div>
      </div>
    </div>
  </div>
);

/* ============================================================
   VARIATION C — "Day-shape ribbon"
   Single horizontal ribbon shows interruption density across hours of the day,
   with the current time marker. Below it: 3 micro-stats inline.
   The chart IS the artwork — feels Today-page native.
============================================================ */

const DayRibbon = ({ values, currentHour = 9, w = 800, h = 96 }) => {
  const max = Math.max(...values);
  const bw = w / values.length;
  return (
    <svg viewBox={`0 0 ${w} ${h + 28}`} width="100%" height={h + 28}>
      <defs>
        <linearGradient id="ribFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="var(--accent)" stopOpacity="0.9" />
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0.2" />
        </linearGradient>
      </defs>
      {values.map((v, i) => {
        const bh = (v / max) * h;
        const x = i * bw;
        const dim = i > currentHour ? 0.35 : 1;
        return (
          <rect key={i} x={x + 1} y={h - bh} width={bw - 2}
                height={Math.max(bh, 2)} fill={i <= currentHour ? "url(#ribFill)" : "var(--hairline)"}
                opacity={dim} rx={2} />
        );
      })}
      {/* hour ticks */}
      {[0, 6, 9, 12, 15, 18, 21].map((hr) => (
        <g key={hr}>
          <line x1={hr * bw} x2={hr * bw} y1={h} y2={h + 4} stroke="var(--hairline)" />
          <text x={hr * bw} y={h + 18} textAnchor="middle" className="axis-text">
            {hr === 0 ? "12a" : hr < 12 ? `${hr}a` : hr === 12 ? "12p" : `${hr-12}p`}
          </text>
        </g>
      ))}
      {/* now line */}
      <line x1={currentHour * bw + bw/2} x2={currentHour * bw + bw/2}
            y1={-4} y2={h + 8} stroke="var(--ink)" strokeWidth="1.5" strokeDasharray="3 3" />
      <rect x={currentHour * bw - 18} y="-2" width="42" height="14" rx="3" fill="var(--ink)" />
      <text x={currentHour * bw + bw/2} y="8" textAnchor="middle"
            style={{ fontFamily: "var(--font-mono)", fontSize: 9, fill: "var(--canvas)", fontWeight: 700 }}>
        9:47 AM
      </text>
    </svg>
  );
};

const MicroStat = ({ label, value, sub }) => (
  <div style={{ flex: 1 }}>
    <div className="t-mono muted" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
    <div style={{ display: "flex", alignItems: "baseline", gap: 6, marginTop: 6 }}>
      <span className="stat-num" style={{ fontSize: 22 }}>{value}</span>
      <span style={{ fontSize: 12, color: "var(--muted)" }}>{sub}</span>
    </div>
  </div>
);

const VariationC = () => (
  <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
    <div className="rationale">
      <b>Direction C — Day-shape ribbon.</b> A single full-width chart of <i>interruptions per hour today</i>,
      with a "now" marker. Past hours are saturated, future hours ghosted.
      Reads like a horizon line. Underneath: three thin live stats. Feels like the Today page, not a dashboard.
    </div>
    <div className="card" style={{ padding: "22px 24px" }}>
      <Header title="Today's shape" sub="interruptions by hour"
        right={<span className="t-mono muted" style={{ fontSize: 11 }}>22 so far · peak 12:00</span>} />
      <DayRibbon values={HOURLY_INTERRUPTS} currentHour={9} />
      <div style={{ display: "flex", gap: 0, marginTop: 18, paddingTop: 16, borderTop: "1px solid var(--hairline-soft)" }}>
        <MicroStat label="Focus protected" value="2.1h" sub="of 3.5h planned" />
        <MicroStat label="Reviews handled" value="3" sub="of 9 open" />
        <MicroStat label="Mentions" value="5" sub="2 still unread" />
        <MicroStat label="Quiet streak" value="42m" sub="best today" />
      </div>
    </div>
  </div>
);

/* ============================================================
   VARIATION D — "Trio: distribution, latency, ship"
   For the analytics-curious. Full strip of three small charts.
   Donut + line + dual bars. Clearly an analytics card.
============================================================ */

const Donut = ({ data, size = 120 }) => {
  const total = data.reduce((a, b) => a + b.v, 0);
  const C = 2 * Math.PI * 44;
  let off = 0;
  return (
    <svg width={size} height={size} viewBox="0 0 120 120">
      <g transform="translate(60 60) rotate(-90)">
        {data.map((d, i) => {
          const len = (d.v / total) * C;
          const el = (
            <circle key={i} r="44" cx="0" cy="0" fill="none"
                    stroke={d.c} strokeWidth="14"
                    strokeDasharray={`${len} ${C - len}`}
                    strokeDashoffset={-off} />
          );
          off += len;
          return el;
        })}
      </g>
      <text x="60" y="58" textAnchor="middle" style={{ fontFamily: "var(--font-mono)", fontSize: 18, fontWeight: 700, fill: "var(--ink)" }}>{total}</text>
      <text x="60" y="72" textAnchor="middle" className="axis-text">signals</text>
    </svg>
  );
};

const LineMini = ({ values, w = 220, h = 90, color = "var(--accent)" }) => {
  const max = Math.max(...values);
  const min = Math.min(...values);
  const stepX = w / (values.length - 1);
  const pts = values.map((v, i) => [i * stepX, h - ((v - min) / (max - min || 1)) * (h - 16) - 8]);
  const path = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h + 18}`} width="100%" height={h + 18}>
      <line x1="0" x2={w} y1={h - 8} y2={h - 8} className="grid-line" />
      <path d={path} stroke={color} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r={i === pts.length - 1 ? 4 : 2.5}
                fill={i === pts.length - 1 ? color : "var(--canvas)"}
                stroke={color} strokeWidth="1.5" />
      ))}
      <text x={pts[pts.length - 1][0]} y={pts[pts.length - 1][1] - 8} textAnchor="end"
            style={{ fontFamily: "var(--font-mono)", fontSize: 10, fontWeight: 700, fill: color }}>
        {values[values.length - 1]}h
      </text>
    </svg>
  );
};

const DualBars = ({ data, h = 90 }) => {
  const max = Math.max(...data.map(d => Math.max(d.prs, d.tickets)));
  return (
    <svg viewBox={`0 0 240 ${h + 22}`} width="100%" height={h + 22}>
      {data.map((d, i) => {
        const x = 8 + i * 46;
        const ph = (d.prs / max) * h;
        const th = (d.tickets / max) * h;
        return (
          <g key={i}>
            <rect x={x} y={h - ph} width={16} height={ph} fill="var(--ink)" rx={2} />
            <rect x={x + 18} y={h - th} width={16} height={th} fill="var(--accent)" opacity={0.85} rx={2} />
            <text x={x + 17} y={h + 14} textAnchor="middle" className="axis-text">{d.d}</text>
          </g>
        );
      })}
    </svg>
  );
};

const VariationD = () => (
  <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
    <div className="rationale">
      <b>Direction D — Analytics trio.</b> A separate "Pulse" card with three small charts:
      where signals come from (donut), how fast you're responding (review latency line, going down = good),
      and what's actually shipping (PRs vs tickets bars). The most "dashboardy" — best if Today is your home page.
    </div>
    <div className="card" style={{ padding: "22px 24px" }}>
      <Header title="Pulse" sub="last 7 days"
        right={<span className="t-mono muted" style={{ fontSize: 11 }}>updated 32s ago</span>} />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 0 }}>
        {/* Donut */}
        <div style={{ paddingRight: 20, borderRight: "1px solid var(--hairline-soft)", display: "flex", gap: 16, alignItems: "center" }}>
          <Donut data={SOURCE_MIX} />
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {SOURCE_MIX.map(s => (
              <div key={s.k} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 11 }}>
                <span style={{ width: 8, height: 8, background: s.c, borderRadius: 2 }} />
                <span style={{ color: "var(--ink)", minWidth: 56 }}>{s.k}</span>
                <span className="t-mono muted">{s.v}</span>
              </div>
            ))}
          </div>
        </div>
        {/* Line */}
        <div style={{ padding: "0 20px", borderRight: "1px solid var(--hairline-soft)" }}>
          <div className="t-mono muted" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: 0.5 }}>Review latency</div>
          <div style={{ marginTop: 6, fontSize: 12, color: "var(--muted)" }}>median time-to-first-comment, lower is better</div>
          <div style={{ marginTop: 8 }}><LineMini values={REVIEW_LATENCY_HOURS} /></div>
          <div style={{ marginTop: 4, fontSize: 11, color: "var(--good)", fontWeight: 500 }}>↓ 5h faster than 7d ago</div>
        </div>
        {/* Bars */}
        <div style={{ paddingLeft: 20 }}>
          <div className="t-mono muted" style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: 0.5 }}>Shipped this week</div>
          <div style={{ marginTop: 6, fontSize: 12, color: "var(--muted)" }}>PRs merged · Tickets closed</div>
          <div style={{ marginTop: 8 }}><DualBars data={SHIP_BY_DAY} /></div>
          <div style={{ marginTop: 4, display: "flex", gap: 14, fontSize: 11, color: "var(--muted)" }}>
            <span><span style={{ display: "inline-block", width: 8, height: 8, background: "var(--ink)", borderRadius: 2, marginRight: 6 }} />12 PRs</span>
            <span><span style={{ display: "inline-block", width: 8, height: 8, background: "var(--accent)", borderRadius: 2, marginRight: 6 }} />4 tickets</span>
          </div>
        </div>
      </div>
    </div>
  </div>
);

/* ============================================================
   THINKING / SYSTEM CARD
============================================================ */
const ThinkingCard = () => (
  <div style={{ padding: "28px 32px", maxWidth: 760, fontSize: 14, lineHeight: 1.6, color: "var(--body)" }}>
    <div className="t-display-md" style={{ marginBottom: 12, color: "var(--ink)" }}>
      How analytics should fit on Today
    </div>
    <p>
      Today is a <b style={{ color: "var(--ink)" }}>present-tense page</b> — what's now, what's next, what needs you.
      Charts that are just "look at last week" feel like a dashboard tab grafted on. Each option below
      tries to keep analytics in service of the moment: every chart answers a question you'd ask <i>this morning</i>.
    </p>
    <div style={{ marginTop: 16, padding: "12px 14px", background: "var(--surface-soft)", borderRadius: 8, fontSize: 13 }}>
      <div style={{ fontWeight: 600, color: "var(--ink)", marginBottom: 6 }}>Visual rules used in all four</div>
      <ul style={{ margin: 0, paddingLeft: 18, color: "var(--body)" }}>
        <li>One accent (Rausch) — never rainbow categorical palettes.</li>
        <li>Ink + accent only on data; gridlines stay hairline-soft.</li>
        <li>Every chart pins a "now" or "today" so the user knows where they are.</li>
        <li>JetBrains Mono on numbers and axis labels.</li>
        <li>Same card chrome as the rest of Today — no chartjunk, no shadows on data.</li>
      </ul>
    </div>
    <p style={{ marginTop: 16 }}>
      <b style={{ color: "var(--ink)" }}>My pick:</b> A or C. A is the most conservative — same surface area, more

      Stack A above C if you want both. D is best if you want a separate "Stats" tab feel without leaving Today.
    </p>
  </div>
);
