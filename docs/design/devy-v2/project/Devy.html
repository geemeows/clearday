<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Devy — Developer Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body, #root { height: 100%; }
  #root { display: flex; flex-direction: column; }

  /* Browser chrome wrapper */
  .browser-frame {
    flex: 1; display: flex; flex-direction: column;
    background: var(--surface-strong);
    overflow: hidden;
  }
  .browser-tabs {
    display: flex; align-items: center; gap: 0;
    padding: 8px 14px 0;
    background: var(--surface-strong);
    border-bottom: 1px solid var(--hairline-soft);
    flex-shrink: 0;
  }
  .traffic-lights { display: flex; gap: 6px; padding: 0 14px 0 4px; }
  .traffic-lights span { width: 11px; height: 11px; border-radius: 50%; }
  .browser-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: var(--canvas);
    border-radius: 8px 8px 0 0;
    font-size: 12px; color: var(--ink);
    max-width: 240px;
    border-top: 1px solid var(--hairline-soft);
    border-left: 1px solid var(--hairline-soft);
    border-right: 1px solid var(--hairline-soft);
    margin-bottom: -1px;
  }
  .browser-tab .fav {
    width: 14px; height: 14px; border-radius: 4px;
    background: var(--accent); color: white;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800;
  }
  .browser-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; background: var(--canvas);
    border-bottom: 1px solid var(--hairline-soft);
    flex-shrink: 0;
  }
  .browser-bar .url {
    flex: 1; padding: 6px 14px; border-radius: 999px;
    background: var(--surface-soft); border: 1px solid var(--hairline-soft);
    font-family: var(--font-mono); font-size: 12px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .browser-bar .url .lock { color: var(--good); }

  /* App body */
  .app-body {
    flex: 1; display: flex; min-height: 0;
    background: var(--canvas);
  }
  .app-main {
    flex: 1; min-width: 0; overflow: auto;
    background: var(--canvas);
  }

  /* In-focus dim overlay */
  .focus-dim::before {
    content: ""; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); z-index: 50;
    pointer-events: none;
    transition: opacity .3s;
  }
  [data-theme="dark"] .focus-dim::before {
    background: rgba(0,0,0,0.7);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="source-glyph.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="today.jsx"></script>
<script type="text/babel" src="inbox.jsx"></script>
<script type="text/babel" src="calendar.jsx"></script>
<script type="text/babel" src="tasks.jsx"></script>
<script type="text/babel" src="overlays.jsx"></script>
<script type="text/babel" src="settings.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "comfortable",
  "accent": "rausch",
  "showBrowserChrome": true,
  "focusActive": false
}/*EDITMODE-END*/;

const ACCENTS = {
  rausch:  { a: "#ff385c", aa: "#e00b41", soft: "#ffd1da", tint: "#fff1f4" },
  blue:    { a: "#2563eb", aa: "#1e40af", soft: "#bfdbfe", tint: "#eff6ff" },
  violet:  { a: "#7c3aed", aa: "#5b21b6", soft: "#ddd6fe", tint: "#f5f3ff" },
  green:   { a: "#0a8754", aa: "#065f3a", soft: "#a7e0c0", tint: "#e7f5ee" },
};

const App = () => {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState("today");
  const [cmdkOpen, setCmdkOpen] = useState(false);
  const [focusModalOpen, setFocusModalOpen] = useState(false);

  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme === "dark" ? "dark" : "light";
    document.documentElement.dataset.density = tweaks.density;
    const c = ACCENTS[tweaks.accent] || ACCENTS.rausch;
    document.documentElement.style.setProperty("--accent", c.a);
    document.documentElement.style.setProperty("--accent-active", c.aa);
    document.documentElement.style.setProperty("--accent-soft", c.soft);
    document.documentElement.style.setProperty("--accent-tint", c.tint);
  }, [tweaks.theme, tweaks.density, tweaks.accent]);

  // ⌘K
  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); setCmdkOpen(o => !o); }
      if (e.key === "Escape") { setCmdkOpen(false); setFocusModalOpen(false); }
    };
    window.addEventListener("keydown", onKey);
    const onOpen = () => setCmdkOpen(true);
    window.addEventListener("devy:open-cmdk", onOpen);
    return () => { window.removeEventListener("keydown", onKey); window.removeEventListener("devy:open-cmdk", onOpen); };
  }, []);

  const renderPage = () => {
    if (page === "today")    return <window.TodayPage onOpenInbox={() => setPage("inbox")} />;
    if (page === "inbox")    return <window.InboxPage />;
    if (page === "calendar") return <window.CalendarPage />;
    if (page === "tasks")    return <window.TasksPage />;
    if (page === "settings") return <window.SettingsPage onBack={() => setPage("today")} />;
    return <window.TodayPage onOpenInbox={() => setPage("inbox")} />;
  };

  const shell = (
    <div className={`app-body ${tweaks.focusActive ? "focus-dim" : ""}`}>
      <window.Sidebar
        page={page} setPage={setPage}
        focusActive={tweaks.focusActive}
        onStartFocus={() => setFocusModalOpen(true)}
        sources={window.DevyData.SOURCES}
        openSettings={() => setPage("settings")}
      />
      <main className="app-main" data-screen-label={`Devy · ${page}`}>
        {renderPage()}
      </main>
    </div>
  );

  return (
    <>
      {tweaks.showBrowserChrome ? (
        <div className="browser-frame">
          <div className="browser-tabs">
            <div className="traffic-lights">
              <span style={{ background: "#ff5f57" }} />
              <span style={{ background: "#febc2e" }} />
              <span style={{ background: "#28c840" }} />
            </div>
            <div className="browser-tab">
              <span className="fav">D</span>
              <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>Devy · {page === "today" ? "Today" : page === "inbox" ? "Inbox" : page === "calendar" ? "Calendar" : "Tasks"}</span>
              <span style={{ color: "var(--muted-soft)", cursor: "pointer" }}>×</span>
            </div>
            <div style={{ padding: "0 8px", color: "var(--muted)", fontSize: 14 }}>+</div>
          </div>
          <div className="browser-bar">
            <span style={{ display: "flex", gap: 6, color: "var(--muted)" }}>
              <span>‹</span><span>›</span><span>↻</span>
            </span>
            <div className="url"><span className="lock">⌐</span>devy.kovacs.dev/{page}</div>
          </div>
          {shell}
        </div>
      ) : shell}

      <window.CmdK open={cmdkOpen} onClose={() => setCmdkOpen(false)} />
      <window.FocusModal open={focusModalOpen} onClose={() => setFocusModalOpen(false)} onStart={() => setTweak("focusActive", true)} />

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection title="Appearance">
          <window.TweakRadio label="Theme" value={tweaks.theme} options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]} onChange={v => setTweak("theme", v)} />
          <window.TweakRadio label="Density" value={tweaks.density} options={[{value:"comfortable",label:"Comfortable"},{value:"compact",label:"Compact"}]} onChange={v => setTweak("density", v)} />
          <window.TweakSelect label="Accent" value={tweaks.accent} options={[{value:"rausch",label:"Rausch (default)"},{value:"blue",label:"Blue"},{value:"violet",label:"Violet"},{value:"green",label:"Green"}]} onChange={v => setTweak("accent", v)} />
        </window.TweakSection>
        <window.TweakSection title="Frame">
          <window.TweakToggle label="Browser chrome" value={tweaks.showBrowserChrome} onChange={v => setTweak("showBrowserChrome", v)} />
        </window.TweakSection>
        <window.TweakSection title="State">
          <window.TweakToggle label="Focus session active" value={tweaks.focusActive} onChange={v => setTweak("focusActive", v)} />
          <window.TweakButton label="Open ⌘K palette" onClick={() => setCmdkOpen(true)} />
          <window.TweakButton label="Open Focus modal" onClick={() => setFocusModalOpen(true)} />
        </window.TweakSection>
      </window.TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
